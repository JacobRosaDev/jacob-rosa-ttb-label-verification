<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TTB Label Verification — Batch</title>
  <style>
    body{font-family:Segoe UI, Arial, sans-serif;background:#f5f7fb;padding:1.5rem}
    .page{max-width:900px;margin:0 auto}
    .card{background:white;padding:1rem;border-radius:12px;border:1px solid #e0e6f0;margin-bottom:1rem}
    label{font-weight:700;display:block;margin-bottom:0.35rem}
    input[type=text], textarea{width:100%;padding:0.6rem;border-radius:8px;border:1px solid #ccd3e0}
    .row{display:flex;gap:0.75rem}
    .col{flex:1}
    .small{width:160px}
    button{background:#0f6fff;color:white;border:none;padding:0.7rem 1rem;border-radius:10px;cursor:pointer}
    .muted{color:#556}
    .summary{display:flex;gap:1rem;align-items:center}
    .result-list{margin-top:1rem}
    .result-item{padding:0.75rem;border-radius:10px;border:1px solid #e6eaf5;background:#fff;margin-bottom:0.5rem}
    .badge-pass{background:#dff3d9;color:#117a30;padding:0.35rem 0.6rem;border-radius:999px}
    .badge-review{background:#ffe6e8;color:#b7242d;padding:0.35rem 0.6rem;border-radius:999px}
    .badge-error{background:#ffefef;color:#861818;padding:0.35rem 0.6rem;border-radius:999px}
  </style>
</head>
<body>
  <main class="page">
    <div class="card">
      <h2>Batch Label Verification</h2>
      <p class="muted">Add up to 8 labels. Each entry needs an image and the seven required fields.</p>
      <div id="cards"></div>
      <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
        <button id="add" type="button">Add label</button>
        <button id="submit" type="button">Submit batch</button>
        <div id="spinner" role="status" aria-live="polite" style="display:none;margin-left:8px;align-self:center">Processing…</div>
      </div>
      <div id="summary" class="muted" role="status" aria-live="polite" style="margin-top:0.75rem"></div>
      <div id="results" class="result-list"></div>
    </div>
  </main>

  <template id="card-template">
    <div class="card card-item">
      <div style="display:flex;gap:1rem;align-items:center">
        <div>
          <label>Image</label>
          <input type="file" accept="image/*" class="image-input" required />
        </div>
        <div style="flex:1">
          <label>Brand name</label>
          <input type="text" class="brand_name" placeholder="e.g. Ketel One" required />
          <label style="margin-top:0.5rem">Class type</label>
          <input type="text" class="class_type" placeholder="e.g. Vodka" required />
          <label style="margin-top:0.5rem">Producer</label>
          <input type="text" class="producer" placeholder="e.g. Ketel Distillery" required />
        </div>
      </div>
      <div style="display:flex;gap:1rem;margin-top:0.5rem">
        <div class="col">
          <label>Country of origin</label>
          <input type="text" class="country_of_origin" placeholder="e.g. Netherlands" required />
        </div>
        <div class="col small">
          <label>ABV</label>
          <input type="text" class="abv" placeholder="40" required />
        </div>
        <div class="col">
          <label>Net contents</label>
          <input type="text" class="net_contents" placeholder="e.g. 750 mL" required />
        </div>
      </div>
      <div style="margin-top:0.5rem">
        <label>Government warning (exact)</label>
        <textarea class="government_warning" placeholder="Paste exact warning text" required></textarea>
      </div>
      <div style="margin-top:0.5rem;text-align:right">
        <button class="remove">Remove</button>
      </div>
    </div>
  </template>

  <script>
    const MAX_BATCH = 8;
    const cardsEl = document.getElementById('cards');
    const addBtn = document.getElementById('add');
    const submitBtn = document.getElementById('submit');
    const template = document.getElementById('card-template');
    const spinner = document.getElementById('spinner');
    const summary = document.getElementById('summary');
    const resultsEl = document.getElementById('results');

    function addCard() {
      if (cardsEl.children.length >= MAX_BATCH) return;
      const node = template.content.cloneNode(true);
      const fragment = node.querySelector('.card-item') || node.firstElementChild;
      cardsEl.appendChild(node);
      const last = cardsEl.lastElementChild;
      last.querySelector('.remove').addEventListener('click', () => last.remove());
    }

    addBtn.addEventListener('click', addCard);
    // start with one
    addCard();

    function collectData() {
      const items = [];
      const images = [];
      const cardNodes = Array.from(cardsEl.querySelectorAll('.card-item'));
      for (const node of cardNodes) {
        const fileInput = node.querySelector('.image-input');
        const file = fileInput.files[0] || null;
        images.push(file);
        items.push({
          brand_name: node.querySelector('.brand_name').value,
          class_type: node.querySelector('.class_type').value,
          producer: node.querySelector('.producer').value,
          country_of_origin: node.querySelector('.country_of_origin').value,
          abv: node.querySelector('.abv').value,
          net_contents: node.querySelector('.net_contents').value,
          government_warning: node.querySelector('.government_warning').value,
        });
      }
      return { items, images };
    }

    function showSpinner(on) {
      spinner.style.display = on ? 'inline-block' : 'none';
    }

    async function submitBatch() {
      const { items, images } = collectData();
      if (items.length === 0) return;
      // simple client-side validation: ensure each has an image
      for (let i = 0; i < items.length; i++) {
        if (!images[i]) {
          alert('Please select an image for each item or remove empty cards.');
          return;
        }
      }

      const fd = new FormData();
      for (let i = 0; i < images.length; i++) {
        fd.append('images', images[i]);
      }
      fd.append('metadata', JSON.stringify(items));

      showSpinner(true);
      summary.textContent = '';
      resultsEl.innerHTML = '';

      try {
        const resp = await fetch('/verify/batch', { method: 'POST', body: fd });
        const payload = await resp.json();
        if (!resp.ok) {
          alert(payload.message || payload.detail || 'Batch verification failed');
          return;
        }

        summary.textContent = `Total: ${payload.total} • Passed: ${payload.passed} • Needs review: ${payload.needs_review} • Errors: ${payload.errors}`;
        for (const r of payload.results) {
          const div = document.createElement('div');
          div.className = 'result-item';
          const badge = r.match === 'passed' ? '<span class="badge-pass">PASSED</span>' : (r.match === 'needs-review' ? '<span class="badge-review">NEEDS REVIEW</span>' : '<span class="badge-error">ERROR</span>');
          div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><div>${r.index}: ${r.filename}</div><div>${badge}</div></div>`;
          if (r.verification) {
            const vr = r.verification;
            const ul = document.createElement('div');
            ul.style.marginTop = '0.5rem';
            for (const f of vr.field_results) {
              const p = document.createElement('div');
              p.innerHTML = `<strong>${f.field_name.replace(/_/g,' ')}</strong>: <span class="muted">expected</span> <div>${escapeHtml(f.submitted_value)}</div><div class="muted">found</div><div>${escapeHtml(f.extracted_value)}</div><div class="muted">${escapeHtml(f.reason)}</div><hr/>`;
              ul.appendChild(p);
            }
            div.appendChild(ul);
          } else if (r.errors) {
            const err = document.createElement('div');
            err.style.color = '#861818';
            err.textContent = r.errors.join('; ');
            div.appendChild(err);
          }

          resultsEl.appendChild(div);
        }
      } catch (e) {
        alert('Unable to contact server');
      } finally {
        showSpinner(false);
      }
    }

    submitBtn.addEventListener('click', submitBatch);

    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
